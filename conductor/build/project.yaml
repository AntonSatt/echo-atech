name: conductor
board: 14port
modules_path:
- /home/kaffe/Documents/github_projects/atech/light_modules
modules:
- id: espnow_link
  instance: radio
  port: port_2
- id: st7735_tft
  instance: screen
  ports:
  - port_3
  - port_4
- id: rotary_encoder
  instance: knob
  ports:
  - port_5
  - port_6
- id: neopixel
  instance: led
  port: port_9
code:
  setup: 'knob.setAcceleration(false);

    '
  loop: "// ============ LIGHT CONDUCTOR: knob drives every board's lights ============\n\
    static bool pKnob = false;\nstatic long lastPos = 0;\nstatic uint8_t hue = 0,\
    \ pat = 0;\nstatic unsigned long nextTx = 0, nextDraw = 0;\nstatic bool ui = true;\n\
    static const char* kNames[4] = {\"SOLID\", \"BREATHE\", \"CHASE\", \"SPARKLE\"\
    };\n\n// SDK loop template above consumed wasPressed(); edge-detect from level\n\
    bool kNow = knob.isPressed();\nbool click = kNow && !pKnob;\npKnob = kNow;\n\n\
    long p = knob.getPosition();\nif (p != lastPos) { hue = (uint8_t)((p * 8) & 255);\
    \ lastPos = p; ui = true; }\nif (click) { pat = (pat + 1) & 3; ui = true; }\n\n\
    unsigned long now = millis();\n\nif (ui || now >= nextTx) {           // 10 Hz\
    \ beacon + instant on change\n  radio.broadcast(pat, hue);\n  nextTx = now + 100;\n\
    }\n\nif (now >= nextDraw) {               // render own grid like any dancer\n\
    \  nextDraw = now + 30;\n  uint32_t t = radio.syncedClock();\n  for (int i = 0;\
    \ i < 9; i++) {\n    uint8_t r, g, b;\n    EspNowLink::pixelColor(i, t, pat, hue,\
    \ r, g, b);\n    led.setPixel(i, r, g, b);\n  }\n  led.show();\n}\n\nif (ui) {\n\
    \  uint8_t r, g, b;\n  EspNowLink::hsvToRgb(hue, 255, r, g, b);\n  knob.setRingColor(r,\
    \ g, b);\n  screen.clear();\n  screen.setCursor(22, 4);  screen.setTextSize(2);\n\
    \  screen.setTextColor(ST7735_TFT::COLOR_WHITE); screen.print(\"CONDUCTOR\");\n\
    \  screen.setCursor(40, 30); screen.setTextSize(1);\n  screen.setTextColor(ST7735_TFT::COLOR_CYAN);\
    \  screen.print(kNames[pat]);\n  screen.fillRect(30, 44, 100, 14, EspNowLink::hsvTo565(hue));\n\
    \  screen.setCursor(13, 66);\n  screen.setTextColor(ST7735_TFT::COLOR_GREEN);\n\
    \  screen.print(\"turn = color  press = mode\");\n  screen.display();\n  ui =\
    \ false;\n}\n"
