name: conductor
board: 14port
modules_path: ../light_modules
modules:
  - {id: espnow_link,    instance: radio,   port: 2}
  - {id: st7735_tft,     instance: screen, ports: [3, 4]}
  - {id: rotary_encoder, instance: knob,   ports: [5, 6]}
  - {id: neopixel,       instance: led,    port: 9}
code:
  setup: |
    knob.setAcceleration(false);
  loop: |
    // ============ LIGHT CONDUCTOR: knob drives every board's lights ============
    static bool pKnob = false;
    static long lastPos = 0;
    static uint8_t hue = 0, pat = 0;
    static unsigned long nextTx = 0, nextDraw = 0;
    static bool ui = true;
    static const char* kNames[4] = {"SOLID", "BREATHE", "CHASE", "SPARKLE"};

    // SDK loop template above consumed wasPressed(); edge-detect from level
    bool kNow = knob.isPressed();
    bool click = kNow && !pKnob;
    pKnob = kNow;

    long p = knob.getPosition();
    if (p != lastPos) { hue = (uint8_t)((p * 8) & 255); lastPos = p; ui = true; }
    if (click) { pat = (pat + 1) & 3; ui = true; }

    unsigned long now = millis();

    if (ui || now >= nextTx) {           // 10 Hz beacon + instant on change
      radio.broadcast(pat, hue);
      nextTx = now + 100;
    }

    if (now >= nextDraw) {               // render own grid like any dancer
      nextDraw = now + 30;
      uint32_t t = radio.syncedClock();
      for (int i = 0; i < 9; i++) {
        uint8_t r, g, b;
        EspNowLink::pixelColor(i, t, pat, hue, r, g, b);
        led.setPixel(i, r, g, b);
      }
      led.show();
    }

    if (ui) {
      uint8_t r, g, b;
      EspNowLink::hsvToRgb(hue, 255, r, g, b);
      knob.setRingColor(r, g, b);
      screen.clear();
      screen.setCursor(22, 4);  screen.setTextSize(2);
      screen.setTextColor(ST7735_TFT::COLOR_WHITE); screen.print("CONDUCTOR");
      screen.setCursor(40, 30); screen.setTextSize(1);
      screen.setTextColor(ST7735_TFT::COLOR_CYAN);  screen.print(kNames[pat]);
      screen.fillRect(30, 44, 100, 14, EspNowLink::hsvTo565(hue));
      screen.setCursor(13, 66);
      screen.setTextColor(ST7735_TFT::COLOR_GREEN);
      screen.print("turn = color  press = mode");
      screen.display();
      ui = false;
    }
