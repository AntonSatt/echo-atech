id: button
name: "Button"
category: input
interface: gpio
size: 1
description: |
  Single digital button input with edge detection. Active-low with internal
  pull-up. Emits a sensor event with value 1 on press and 0 on release.

driver:
  header: button.h
  source: button.cpp
  class_name: ButtonModule

templates:
  globals: |
    ButtonModule {{ instance }}({{ pin_a }});
  setup: |
    {{ instance }}.begin();
  loop: |
    if ({{ instance }}.wasPressed()) {
      Serial.println("{\"type\":\"event\",\"payload\":{\"event_type\":\"button\",\"key\":\"{{ instance }}\",\"value\":1,\"source\":\"button\"}}");
    }
    if ({{ instance }}.wasReleased()) {
      Serial.println("{\"type\":\"event\",\"payload\":{\"event_type\":\"button\",\"key\":\"{{ instance }}\",\"value\":0,\"source\":\"button\"}}");
    }

events:
  - key: pressed
    type: button
    value_type: int
    description: "1 on press edge, 0 on release edge"

actions: []
lib_deps: []

usage: |
  // Public API of ButtonModule — the instance is `{{ instance }}`.
  // Edge detection: wasPressed()/wasReleased() return true once per edge.
  // For polling: isPressed() returns the current state.
  if ({{ instance }}.wasPressed())  { /* button just went down */ }
  if ({{ instance }}.wasReleased()) { /* button just released  */ }
  bool down = {{ instance }}.isPressed();

