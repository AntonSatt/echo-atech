id: aht20
name: "AHT20 Temperature & Humidity Sensor"
category: sensor
interface: i2c
size: 1
i2c_address: 0x38
description: |
  AHT20 integrated temperature + humidity sensor over I2C (address 0x38).
  Range -40 to +125 °C and 0-100 %RH. A background FreeRTOS task takes
  measurements (~75 ms each) and caches them, so the getters return instantly
  and never block your loop. Single port: SDA on Line A, SCL on Line B.

driver:
  header: aht20.h
  source: aht20.cpp
  class_name: AHT20

templates:
  # Hardware I2C on the port's two lines (SDA = Line A, SCL = Line B).
  globals: |
    WireI2C {{ instance }}_bus(Wire, {{ pin_a }}, {{ pin_b }});
    AHT20 {{ instance }}(&{{ instance }}_bus);
  setup: |
    {{ instance }}_bus.begin(400000);
    {{ instance }}.begin();
  # Built-in: emit cached temperature + humidity every 2 s as JSON events.
  loop: |
    static unsigned long {{ instance }}_last = 0;
    if (millis() - {{ instance }}_last >= 2000) {
      {{ instance }}_last = millis();
      Serial.print("{\"type\":\"event\",\"payload\":{\"event_type\":\"sensor\",\"key\":\"{{ instance }}_temperature\",\"value\":");
      Serial.print({{ instance }}.readTemperature(), 2);
      Serial.println(",\"unit\":\"C\",\"source\":\"aht20\"}}");
      Serial.print("{\"type\":\"event\",\"payload\":{\"event_type\":\"sensor\",\"key\":\"{{ instance }}_humidity\",\"value\":");
      Serial.print({{ instance }}.readHumidity(), 2);
      Serial.println(",\"unit\":\"%\",\"source\":\"aht20\"}}");
    }

events:
  - key: temperature
    type: sensor
    value_type: float
    unit: C
    description: "Temperature in degrees Celsius. Emitted every 2 s (cached reading)."
  - key: humidity
    type: sensor
    value_type: float
    unit: "%"
    description: "Relative humidity in %RH. Emitted every 2 s (cached reading)."

actions: []
lib_deps: []

# Real hardware read-back: the I2C sensor ACKs at 0x38 only if it's wired and
# powered. `atech check` uses this to report "not responding" instead of a
# silent failure.
health_check: "{{ instance }}.isConnected()"

usage: |
  // Public API of AHT20 — the instance is `{{ instance }}`.
  // begin() ran in setup() and started a background measurement task, so the
  // getters below return the latest cached value instantly (no blocking).
  // If you leave loop empty, the module already streams temperature + humidity
  // events every 2 s for you — only add code here for custom behaviour.
  float c = {{ instance }}.readTemperature();        // degrees Celsius
  float f = c * 9.0f / 5.0f + 32.0f;                  // if you want Fahrenheit
  float rh = {{ instance }}.readHumidity();           // % relative humidity
  if ({{ instance }}.isConnected()) { /* sensor is responding on the bus */ }
