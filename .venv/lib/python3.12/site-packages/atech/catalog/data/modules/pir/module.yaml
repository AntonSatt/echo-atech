id: pir
name: "PIR Motion Sensor (AM312)"
category: sensor
interface: gpio
size: 1
description: |
  AM312 mini passive-infrared motion sensor. A single digital OUT line goes
  HIGH for ~2 s when motion is seen within its ~3-5 m / 100° cone, then
  returns LOW. Hardware-debounced — no pull-ups needed. Uses only Line A.
  The sensor needs ~30 s after power-on to thermally stabilise; isWarmedUp()
  reports when readings can be trusted.

driver:
  header: pir.h
  source: pir.cpp
  class_name: PIRSensor

templates:
  globals: |
    PIRSensor {{ instance }}({{ pin_a }});
  setup: |
    {{ instance }}.begin();
  # Built-in event emission: call update() each loop and report edges as JSON.
  # Spurious triggers during the 30 s warmup are suppressed.
  loop: |
    {{ instance }}.update();
    if ({{ instance }}.isWarmedUp()) {
      if ({{ instance }}.wasTriggered()) {
        Serial.println("{\"type\":\"event\",\"payload\":{\"event_type\":\"sensor\",\"key\":\"{{ instance }}\",\"value\":1,\"source\":\"pir\"}}");
      }
      if ({{ instance }}.wasCleared()) {
        Serial.println("{\"type\":\"event\",\"payload\":{\"event_type\":\"sensor\",\"key\":\"{{ instance }}\",\"value\":0,\"source\":\"pir\"}}");
      }
    }

events:
  - key: motion
    type: sensor
    value_type: int
    description: "1 on motion start (rising edge), 0 when motion clears (~2 s later). Suppressed during the 30 s warmup."

actions: []
lib_deps: []

usage: |
  // Public API of PIRSensor — the instance is `{{ instance }}`.
  // IMPORTANT: call update() once at the top of loop() BEFORE the checks, or
  // edge detection never fires. (If you leave loop empty, the module already
  // emits motion events for you — only add this if you want custom behaviour.)
  {{ instance }}.update();

  if ({{ instance }}.wasTriggered()) { /* motion just started (edge, fires once) */ }
  if ({{ instance }}.wasCleared())   { /* motion just ended (edge, ~2 s later)   */ }
  bool now = {{ instance }}.isMotionDetected();      // level: motion right now?

  if (!{{ instance }}.isWarmedUp()) { /* first ~30 s: ignore, sensor settling */ }
  unsigned long ms = {{ instance }}.timeSinceLastMotion();   // ULONG_MAX if never
