id: dc_motor
name: "DC Motor"
category: motor
interface: gpio
size: 1
description: |
  H-bridge DC motor driver. Two GPIO lines drive a small DC motor with PWM
  speed and direction control. Accepts a single 'speed' action with value
  in -255..255 (negative reverses direction).

driver:
  header: dc_motor.h
  source: dc_motor.cpp
  class_name: DCMotor

templates:
  globals: |
    DCMotor {{ instance }}({{ pin_a }}, {{ pin_b }});
  setup: |
    {{ instance }}.begin();
  loop: ""

actions:
  - key: "{{ instance }}_speed"
    value_type: int
    description: "Set motor speed in [-255, 255]; negative = reverse."
  - key: "{{ instance }}_stop"
    value_type: "null"
    description: "Coast to stop."
  - key: "{{ instance }}_brake"
    value_type: "null"
    description: "Active brake."

events: []
lib_deps: []

usage: |
  // Public API of DCMotor — the instance is `{{ instance }}`.
  // setSpeed accepts -255..255 (negative = reverse). forward/reverse take 0..255.
  // stop() coasts. brake() actively shorts. PWM is hardware (LEDC) for the first
  // 4 motors on the board; subsequent motors fall back to digital on/off.
  {{ instance }}.setSpeed(200);         // forward at ~78%
  {{ instance }}.setSpeed(-128);        // reverse at 50%
  {{ instance }}.forward(255);          // full forward
  {{ instance }}.reverse(255);          // full reverse
  {{ instance }}.stop();                // coast
  {{ instance }}.brake();               // active brake
  int16_t s = {{ instance }}.getSpeed();

