id: stepper_motor
name: "Stepper Motor Driver (NEMA 17 / TMC2209)"
category: motor
interface: gpio
size: 2
description: |
  Bipolar stepper motor (e.g. NEMA 17) driven by a TMC2209 in STEP/DIR mode.
  Spans TWO adjacent ports: STEP on Line A and DIR on Line B of the primary
  port, ENABLE on Line A of the secondary port. Requires an EXTERNAL motor
  supply (typically 12-24 V) wired to the driver board — the SDK can't detect
  a missing VMOT, the symptom is "calls succeed but the motor doesn't move".
  All motion calls are BLOCKING (they return once the pulses are issued).

driver:
  header: stepper_motor.h
  source: stepper_motor.cpp
  class_name: StepperMotor

templates:
  # Primary port: STEP = Line A (pin_a), DIR = Line B (pin_b).
  # Secondary port: ENABLE = Line A (pin_a2).
  globals: |
    StepperMotor {{ instance }}({{ pin_a }}, {{ pin_b }}, {{ pin_a2 }});
  setup: |
    {{ instance }}.begin();
  loop: ""

actions: []
events: []
lib_deps: []

usage: |
  // Public API of StepperMotor — the instance is `{{ instance }}`.
  // begin() already ran in setup(); the motor starts DISABLED (coils released).
  // All moves are BLOCKING and auto-enable the driver. stepsPerSecond is
  // clamped to [1, 20000]; 200-2000 is smooth. Position is in microsteps,
  // counted from power-on / resetPosition() — there is no homing switch.

  // --- relative moves ---
  {{ instance }}.moveSteps(1600, 800);     // +1600 microsteps fwd @ 800 sps (~1 rev at 1/8)
  {{ instance }}.moveSteps(-800, 1200);    // reverse 800 microsteps

  // --- direction-then-step ---
  {{ instance }}.setDirection(true);       // true = forward
  {{ instance }}.step(400, 600);           // 400 microsteps in current direction

  // --- absolute positioning (relative to resetPosition/power-on) ---
  {{ instance }}.resetPosition();          // call at a known mechanical reference
  {{ instance }}.moveTo(3200, 1000);       // go to absolute position 3200
  int32_t pos = {{ instance }}.getPosition();

  // --- power / config ---
  {{ instance }}.enable();                 // energise coils (holding torque)
  {{ instance }}.disable();                // release coils when idle (saves heat/power)
  {{ instance }}.setReversed(true);        // flip what "forward" means for this motor

  // Never digitalWrite() the STEP/DIR/ENABLE pins directly — use these methods.
