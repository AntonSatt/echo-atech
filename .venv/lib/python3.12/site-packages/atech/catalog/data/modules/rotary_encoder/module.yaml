id: rotary_encoder
name: "Rotary Encoder Knob"
category: input
interface: gpio
size: 2
description: |
  18-step quadrature rotary encoder with a push-button switch and a 12-LED
  NeoPixel indicator ring. Spans TWO adjacent ports — placement requires an
  adjacent pair like [1, 2] or [3, 4] on the 8-port board. Uses interrupts
  for missed-step-free decoding at any speed, plus a background FreeRTOS
  task that renders the ring indicator in ~1ms regardless of loop timing.

driver:
  header: rotary_encoder.h
  source: rotary_encoder.cpp
  class_name: RotaryEncoder

templates:
  # Primary port supplies CLK + DT; secondary port supplies SW + ring data.
  globals: |
    RotaryEncoder {{ instance }}({{ pin_a }}, {{ pin_b }}, {{ pin_a2 }}, {{ pin_b2 }});
  setup: |
    {{ instance }}.begin();
  loop: |
    {{ instance }}.update();
    if ({{ instance }}.wasRotatedCW() || {{ instance }}.wasRotatedCCW()) {
      Serial.print("{\"type\":\"event\",\"payload\":{\"event_type\":\"sensor\",\"key\":\"{{ instance }}\",\"value\":");
      Serial.print((long){{ instance }}.getPosition());
      Serial.println(",\"source\":\"rotary_encoder\"}}");
    }
    if ({{ instance }}.wasPressed()) {
      Serial.println("{\"type\":\"event\",\"payload\":{\"event_type\":\"button\",\"key\":\"{{ instance }}_btn\",\"value\":1,\"source\":\"rotary_encoder\"}}");
    }

events:
  - key: position
    type: sensor
    value_type: int
    description: "Cumulative knob position (acceleration applied). Emitted on every detent of rotation."
  - key: button
    type: button
    value_type: int
    description: "Emitted with value=1 each time the knob's push-button is pressed."

actions: []

lib_deps:
  - "adafruit/Adafruit NeoPixel"

usage: |
  // Public API of RotaryEncoder — the instance is `{{ instance }}`.
  // Position decoding is interrupt-driven and missed-step-free; call update()
  // each loop only for button edge detection.
  {{ instance }}.update();

  if ({{ instance }}.wasRotatedCW())  { /* CW edge since last call */ }
  if ({{ instance }}.wasRotatedCCW()) { /* CCW edge since last call */ }
  int32_t pos = {{ instance }}.getPosition();        // accelerated counter
  {{ instance }}.resetPosition();                    // zero it
  {{ instance }}.setAcceleration(true, 5);           // off, or multiplier 1..N

  if ({{ instance }}.wasPressed()) { /* button down edge */ }
  if ({{ instance }}.isPressed())  { /* polled level */ }

  // Optional indicator ring (12 NeoPixels). Position auto-follows the knob.
  {{ instance }}.setRingColor(255, 0, 0);            // ring colour
  {{ instance }}.setRingBrightness(80);              // 0..255 (Adafruit scale)
  {{ instance }}.enableRing(false);                  // turn ring off entirely
  {{ instance }}.setRingPosition(3.5);               // override knob coupling
