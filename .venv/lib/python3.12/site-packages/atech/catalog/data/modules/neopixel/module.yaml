id: neopixel
name: "NeoPixel 3x3 Grid"
category: led
interface: gpio
size: 1
description: |
  3x3 grid of WS2812B / SK6812 LEDs. Drives both Line A (RGB) and Line B
  (RGBW) so the same driver works for both module revisions. Accepts a
  'pixel' action ({index, r, g, b}) and a 'fill' action ({r, g, b}).

driver:
  header: neopixel.h
  source: neopixel.cpp
  class_name: NeoPixelGrid

templates:
  globals: |
    NeoPixelGrid {{ instance }}({{ pin_a }}, {{ pin_b }});
  setup: |
    {{ instance }}.begin();
  loop: ""

actions:
  - key: "{{ instance }}_fill"
    value_type: json
    description: 'Object {"r": 0-255, "g": 0-255, "b": 0-255} sets every LED to that colour.'
  - key: "{{ instance }}_pixel"
    value_type: json
    description: 'Object {"index": 0-8, "r": ..., "g": ..., "b": ...} sets one LED.'
  - key: "{{ instance }}_clear"
    value_type: "null"
    description: "Turn every LED off."

events: []
lib_deps:
  - "adafruit/Adafruit NeoPixel"

usage: |
  // Public API of NeoPixelGrid — the instance is `{{ instance }}`.
  // 3x3 grid (9 LEDs). Always call show() after staging colors.
  // Indices 0-8, or row/col 0-2. Brightness is clamped to 20% (51/255).
  {{ instance }}.setAll(255, 0, 0);                   // every LED red
  {{ instance }}.setPixel(4, 0, 255, 0);              // centre LED green
  {{ instance }}.setPixelXY(0, 2, 0, 0, 255);         // top-right blue
  {{ instance }}.setRow(1, 80, 80, 80);               // middle row dim white
  {{ instance }}.setColumn(0, 0, 0, 0);               // left column off
  {{ instance }}.clear();                             // stage all-off
  {{ instance }}.show();                              // push to LEDs (do this!)
  {{ instance }}.setBrightness(30);                   // 0..51 effective

